<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply For Job</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #f4f7f6;
            font-family: 'Roboto', sans-serif;
        }

        .wrapper {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100vh;
            margin: 0 auto;
            /* আপনার ছবির ডিরেক্ট লিঙ্ক এখানে দিন */
            background: url(''background.png'') no-repeat center top;
            background-size: cover;
            overflow: hidden;
        }

        /* Apply Now Button Design */
        .claim-btn {
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 85%;
            height: 55px;
            background: linear-gradient(180deg, #102a43, #004a7c);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            transition: 0.3s;
            cursor: pointer;
            animation: pulse 2s infinite; /* বাটনটি হালকা নড়বে নজর কাড়ার জন্য */
        }

        @keyframes pulse {
            0% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.03); }
            100% { transform: translateX(-50%) scale(1); }
        }

        .claim-btn:hover {
            background: linear-gradient(180deg, #004a7c, #102a43);
        }

        /* Timer and Offer Box */
        .timer-info {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            background: rgba(16, 42, 67, 0.92);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            color: white;
        }

        .offer-txt {
            font-size: 16px;
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .dot {
            height: 10px;
            width: 10px;
            background-color: #ff3e3e;
            border-radius: 50%;
            display: inline-block;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.2; }
            100% { opacity: 1; }
        }

        .indicator-bg {
            width: 100%;
            height: 10px;
            background-color: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            overflow: hidden;
        }

        .indicator-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            border-radius: 10px;
            transition: width 1s linear;
        }

        #timer-display {
            color: #ffcc00;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <a href="https://www.af9m8trk.com/RWG11EZJ/TKR128DB/?s1=Siam" class="claim-btn">
            Apply Now →
        </a>

        <div class="timer-info">
            <div class="offer-txt">
                <span class="dot"></span> Offer Expiring: <span id="timer-display">04:43</span>
            </div>
            <div class="indicator-bg">
                <div class="indicator-fill" id="fill"></div>
            </div>
        </div>
    </div>

    <script>
        let time = 283; 
        const timerDisplay = document.getElementById('timer-display');
        const fill = document.getElementById('fill');
        const totalTime = 283; 

        const countdown = setInterval(() => {
            let minutes = Math.floor(time / 60);
            let seconds = time % 60;
            seconds = seconds < 10 ? '0' + seconds : seconds;
            minutes = minutes < 10 ? '0' + minutes : minutes;

            timerDisplay.innerHTML = `${minutes}:${seconds}`;
            
            let progressWidth = (time / totalTime) * 100;
            fill.style.width = progressWidth + "%";

            if (time <= 0) {
                clearInterval(countdown);
                timerDisplay.innerHTML = "00:00";
            } else {
                time--;
            }
        }, 1000);
    </script>
</body>
</html>
